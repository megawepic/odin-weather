<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header>Weather checker, SEA</header>

    <div class="main">
      <div class="search-container">
        <div class="search-function">
          <input
            type="text"
            id="city-input"
            placeholder="Search for a city..."
            autocomplete="off"
          />

          <div id="suggestions"></div>
        </div>
        <div class="search">
          <button id="search-btn">Search</button>
        </div>
      </div>
      <div id="output">
        <div id="location"></div>

        <div id="temp" class="weather">
          <div id="temp-display"></div>
        </div>

        <div id="humidity" class="weather"></div>

        <div id="cloud" class="weather"></div>
      </div>
    </div>

    <div class="footer">
      <p>@MGP odin weather</p>
    </div>
  </body>
</html>
